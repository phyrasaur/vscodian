name: CI
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: pnpm/action-setup@v4
      with:
        version: 11.5.0
    - uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: pnpm
    - run: pnpm install --frozen-lockfile
    - run: |
        echo ">>> Start compile vscode-office."
        pnpm run build
        echo ">>> Compile vscode-office sucess!"
